name: Integration Test

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Lint
        run: pnpm lint.check

      - name: Run unit tests
        run: pnpm test

      - name: Compute dates
        id: dates
        run: |
          echo "checkin=$(date -d '+1 month' '+%Y-%m-01')" >> "$GITHUB_OUTPUT"
          echo "checkout=$(date -d '+1 month +14 days' '+%Y-%m-15')" >> "$GITHUB_OUTPUT"

      - name: Integration test
        run: node src/check.mjs
        env:
          WATCHDOG_CONFIG: >
            {
              "id": "test-hexenhauschen",
              "property_url": "https://www.booking.com/hotel/at/hexenhauschen.en-gb.html",
              "checkin_date": "${{ steps.dates.outputs.checkin }}",
              "checkout_date": "${{ steps.dates.outputs.checkout }}",
              "adults": 2,
              "children": 0,
              "min_nights": 3
            }
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_TEST }}
