name: Check Availability

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without sending alerts or writing state'
        type: boolean
        default: false

jobs:
  fetch-config:
    runs-on: ubuntu-latest
    steps:
      - name: Random delay
        run: sleep $((RANDOM % 3600))

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Fetch config
        run: node src/config.mjs
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

      - name: Upload matrix
        uses: actions/upload-artifact@v4
        with:
          name: matrix
          path: matrix.json

  load-config:
    needs: fetch-config
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.config.outputs.matrix }}
    steps:
      - name: Download matrix
        uses: actions/download-artifact@v4
        with:
          name: matrix

      - name: Set matrix output
        id: config
        run: echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  check:
    needs: load-config
    if: needs.load-config.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        watchdog: ${{ fromJson(needs.load-config.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Check availability
        run: node src/check.mjs
        env:
          WATCHDOG_CONFIG: ${{ toJson(matrix.watchdog) }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

